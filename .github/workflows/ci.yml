name: Build and Deploy / 构建与部署

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  IMAGE_NAME: acore-ranking

jobs:
  test:
    name: Test / 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js / 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies / 安装后端依赖
        working-directory: backend
        run: npm ci

      - name: Install Frontend Dependencies / 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: Lint / 代码检查
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Build Check / 构建检查
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build

  build-and-push:
    name: Build and Push Image / 构建并推送镜像
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx / 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to TCR / 登录 TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and Push / 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to SCF / 部署到 SCF
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Serverless / 配置 Serverless
        run: npm install -g serverless

      - name: Deploy / 部署
        run: serverless deploy
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_AUTH: ${{ secrets.DB_AUTH }}
          DB_CHARACTERS: ${{ secrets.DB_CHARACTERS }}
          DB_WORLD: ${{ secrets.DB_WORLD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          API_KEY: ${{ secrets.API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
