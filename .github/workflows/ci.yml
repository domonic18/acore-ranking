name: CI / 持续集成

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Test / 后端测试
    runs-on: ubuntu-latest
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Setup Node.js / 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies / 安装依赖
        working-directory: backend
        run: npm ci

      - name: Type Check / 类型检查
        working-directory: backend
        run: npx tsc --noEmit

      - name: Test / 运行测试
        working-directory: backend
        run: npm test

      - name: Build / 构建
        working-directory: backend
        run: npm run build

  frontend-build:
    name: Frontend Build / 前端构建
    runs-on: ubuntu-latest
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Setup Node.js / 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies / 安装依赖
        working-directory: frontend
        run: npm ci

      - name: Build / 构建
        working-directory: frontend
        run: npm run build

  docker-build-check:
    name: Docker Build Check / Docker 构建检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Set up Docker Buildx / 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image / 构建镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: acore-ranking:test
          cache-from: type=gha
