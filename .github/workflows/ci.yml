name: CI/CD Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      skip_lint:
        description: '跳过代码检查阶段'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_test:
        description: '跳过单元测试阶段'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  NODE_VERSION: '20'
  REGISTRY: ccr.ccs.tencentyun.com
  NAMESPACE: ${{ secrets.TCR_NAMESPACE }}
  IMAGE_NAME: acore-ranking

jobs:
  # ============================================================
  # Stage 1: 前端代码检查与构建
  # ============================================================
  frontend:
    name: Frontend / 前端
    runs-on: ubuntu-latest

    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Setup Node.js / 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies / 安装依赖
        working-directory: frontend
        run: npm ci

      - name: Lint / 代码检查
        if: github.event.inputs.skip_lint != 'true'
        working-directory: frontend
        run: npm run lint

      - name: Build / 构建
        working-directory: frontend
        run: npm run build

  # ============================================================
  # Stage 2: 后端代码检查与测试
  # ============================================================
  backend:
    name: Backend / 后端
    runs-on: ubuntu-latest

    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Setup Node.js / 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies / 安装依赖
        working-directory: backend
        run: npm ci

      - name: Lint / 代码检查
        if: github.event.inputs.skip_lint != 'true'
        working-directory: backend
        run: npm run lint

      - name: Type Check / 类型检查
        working-directory: backend
        run: npx tsc --noEmit

      - name: Test / 运行测试
        if: github.event.inputs.skip_test != 'true'
        working-directory: backend
        run: npm test

      - name: Build / 构建
        working-directory: backend
        run: npm run build

  # ============================================================
  # Stage 3: Docker 镜像构建与推送
  # ============================================================
  docker:
    name: Docker Build & Push / Docker 构建与推送
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    timeout-minutes: 15

    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Dockerfile Lint / Dockerfile 检查
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: error

      - name: Set up Docker Buildx / 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to TCR / 登录腾讯云容器镜像服务
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Generate image tags / 生成镜像标签
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-')
          echo "sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and Push / 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info / 输出镜像信息
        run: |
          echo "Image pushed: ${{ steps.vars.outputs.image_tag }}"
          echo "Latest tag: ${{ steps.vars.outputs.latest_tag }}"
