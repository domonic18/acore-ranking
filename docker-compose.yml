services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        VITE_ICON_BASE_URL: ${VITE_ICON_BASE_URL}
        VITE_AOWOW_BASE_URL: ${VITE_AOWOW_BASE_URL}
        VITE_WIDGET_DETAIL_URL: ${VITE_WIDGET_DETAIL_URL}
        VITE_WIDGET_ONLINE_URL: ${VITE_WIDGET_ONLINE_URL}
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
