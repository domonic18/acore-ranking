<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="rankEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="70%" stop-color="#0066cc" />
      <stop offset="100%" stop-color="#003366" />
    </radialGradient>
    <linearGradient id="rankGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffec8b" />
      <stop offset="50%" stop-color="#daa520" />
      <stop offset="100%" stop-color="#8b6914" />
    </linearGradient>
    <linearGradient id="rankFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a5560" />
      <stop offset="50%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
  </defs>

  <!-- 外框 -->
  <circle cx="16" cy="16" r="14.5" fill="url(#rankFrame)" stroke="url(#rankGold)" stroke-width="1.2" />
  <!-- 内圈符文 -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#rankGold)" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.8" />

  <!-- 眼睛轮廓 -->
  <path
    d="M5 16c3.2-5.2 7.5-8 11-8s7.8 2.8 11 8c-3.2 5.2-7.5 8-11 8S8.2 21.2 5 16z"
    fill="#0f172a"
    stroke="url(#rankGold)"
    stroke-width="1"
    stroke-linejoin="round"
  />

  <!-- 瞳孔 -->
  <circle cx="16" cy="16" r="5" fill="url(#rankEye)" stroke="#00f0ff" stroke-width="0.5" />
  <circle cx="16" cy="16" r="2.2" fill="#001a33" />

  <!-- 高光 -->
  <circle cx="14.3" cy="14.3" r="1.3" fill="#ffffff" opacity="0.8" />

  <!-- 四角符文 -->
  <path d="M16 2.5v2M16 27.5v2M2.5 16h2M27.5 16h2" stroke="url(#rankGold)" stroke-width="1" stroke-linecap="round" />
</svg>
